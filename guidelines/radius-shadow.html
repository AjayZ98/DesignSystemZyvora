<!-- @dsCard group="Spacing" viewport="700x150" subtitle="Radius + elevation used on cards, modals" name="Radius & Shadow" -->
<!DOCTYPE html><html><head><link rel="stylesheet" href="../styles.css"><style>
*{margin:0;box-sizing:border-box}body{width:700px;padding:16px;display:flex;gap:16px;background:var(--surface-page);font-family:var(--font-body);font-size:11px;color:var(--text-muted)}
.box{width:110px;height:90px;background:var(--surface-card);display:flex;align-items:flex-end;justify-content:center;padding-bottom:8px}
</style></head><body>
<div class="box" style="border-radius:var(--radius-sm);box-shadow:var(--shadow-sm)">sm</div>
<div class="box" style="border-radius:var(--radius-md);box-shadow:var(--shadow-md)">md</div>
<div class="box" style="border-radius:var(--radius-lg);box-shadow:var(--shadow-lg)">lg</div>
<div class="box" style="border-radius:var(--radius-full);box-shadow:var(--shadow-glow)">full</div>
</body></html>
