<!-- @dsCard group="Type" viewport="700x190" subtitle="Body copy sizes for UI + long-form" name="Body Text" -->
<!DOCTYPE html><html><head><link rel="stylesheet" href="../styles.css"><style>
*{margin:0;box-sizing:border-box}body{width:700px;padding:14px;font-family:var(--font-body);color:var(--text-body)}
p{margin-bottom:8px}
</style></head><body>
<p style="font-size:var(--text-body-l);color:var(--text-heading);font-weight:500">Body Large — used for intros and lead paragraphs.</p>
<p style="font-size:var(--text-body)">Body — the default size for UI copy, descriptions, and settings labels.</p>
<p style="font-size:var(--text-body-s);color:var(--text-muted)">Body Small — helper text, metadata, timestamps.</p>
<p style="font-size:var(--text-caption);color:var(--text-muted);text-transform:uppercase;letter-spacing:var(--tracking-wide)">Caption / eyebrow label</p>
</body></html>
