<!-- @dsCard group="Colors" viewport="700x150" subtitle="Ink neutrals + cream surfaces" name="Neutrals" -->
<!DOCTYPE html><html><head><link rel="stylesheet" href="../styles.css"><style>
*{margin:0;box-sizing:border-box}body{font-family:var(--font-body);width:700px}
.row{display:flex;height:80px}
.sw{flex:1;display:flex;align-items:flex-end;padding:6px;font-size:10px;color:#fff;font-weight:600}
.sw.dark{color:var(--ink-800)}
</style></head><body>
<div class="row">
<div class="sw dark" style="background:var(--ink-50)">50</div>
<div class="sw dark" style="background:var(--ink-100)">100</div>
<div class="sw dark" style="background:var(--ink-200)">200</div>
<div class="sw" style="background:var(--ink-300)">300</div>
<div class="sw" style="background:var(--ink-400)">400</div>
<div class="sw" style="background:var(--ink-500)">500</div>
<div class="sw" style="background:var(--ink-600)">600</div>
<div class="sw" style="background:var(--ink-700)">700</div>
<div class="sw" style="background:var(--ink-800)">800</div>
<div class="sw" style="background:var(--ink-900)">900</div>
</div>
<div class="row">
<div class="sw dark" style="background:var(--cream-50)">cream 50</div>
<div class="sw dark" style="background:var(--cream-100)">cream 100</div>
<div class="sw dark" style="background:var(--cream-200)">cream 200</div>
</div>
</body></html>
