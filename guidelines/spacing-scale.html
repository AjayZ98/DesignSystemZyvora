<!-- @dsCard group="Spacing" viewport="700x160" subtitle="4px base scale" name="Spacing Scale" -->
<!DOCTYPE html><html><head><link rel="stylesheet" href="../styles.css"><style>
*{margin:0;box-sizing:border-box}body{width:700px;padding:14px;font-family:var(--font-mono);font-size:11px;color:var(--text-muted)}
.row{display:flex;align-items:center;gap:10px;margin-bottom:6px}
.bar{background:var(--purple-500);height:10px;border-radius:2px}
</style></head><body>
<div class="row"><div class="bar" style="width:var(--space-1)"></div>4px</div>
<div class="row"><div class="bar" style="width:var(--space-2)"></div>8px</div>
<div class="row"><div class="bar" style="width:var(--space-4)"></div>16px</div>
<div class="row"><div class="bar" style="width:var(--space-6)"></div>24px</div>
<div class="row"><div class="bar" style="width:var(--space-8)"></div>32px</div>
<div class="row"><div class="bar" style="width:var(--space-12)"></div>48px</div>
<div class="row"><div class="bar" style="width:var(--space-16)"></div>64px</div>
</body></html>
