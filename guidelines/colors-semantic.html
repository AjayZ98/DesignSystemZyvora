<!-- @dsCard group="Colors" viewport="700x110" subtitle="Success / warning / danger / info" name="Semantic" -->
<!DOCTYPE html><html><head><link rel="stylesheet" href="../styles.css"><style>
*{margin:0;box-sizing:border-box}body{font-family:var(--font-body);width:700px;display:flex;gap:16px;padding:12px}
.chip{flex:1;border-radius:var(--radius-md);padding:14px;font-size:13px;font-weight:600}
</style></head><body>
<div class="chip" style="background:var(--success-100);color:var(--success-500)">Success</div>
<div class="chip" style="background:var(--warning-100);color:var(--warning-500)">Warning</div>
<div class="chip" style="background:var(--danger-100);color:var(--danger-500)">Danger</div>
<div class="chip" style="background:var(--info-100);color:var(--info-500)">Info</div>
</body></html>
